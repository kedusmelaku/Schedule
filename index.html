<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheduler</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Screen 1: Workers ── -->
<div id="screen-workers" class="screen active">
  <header>
    <span class="header-title">Scheduler</span>
    <button class="btn-primary" onclick="goToSchedule()">Build Schedule →</button>
  </header>

  <div class="page-body">
    <div class="page-intro">
      <h1>Employees</h1>
      <p>Add your team here. They'll be saved automatically for next time.</p>
    </div>

    <div class="worker-grid" id="worker-grid"></div>

    <button class="btn-add-worker" onclick="openModal()">+ Add Employee</button>
  </div>
</div>

<!-- ── Screen 2: Schedule ── -->
<div id="screen-schedule" class="screen">
  <header>
    <button class="btn-back" onclick="goToWorkers()">← Employees</button>
    <span class="header-title">Scheduler</span>
    <div class="header-actions">
      <button class="btn-secondary" id="copy-btn" disabled onclick="copyToClipboard()">Copy to Clipboard</button>
      <button class="btn-primary" onclick="generate()">Generate Schedule</button>
    </div>
  </header>

  <div class="page-body schedule-layout">
    <div class="availability-panel">
      <h2 class="panel-title">Availability</h2>
      <p class="panel-subtitle">Select which days each worker is available this week.</p>
      <div id="availability-list"></div>
    </div>

    <div class="output-panel">
      <h2 class="panel-title">Schedule</h2>
      <div class="schedule-grid">
        <div class="empty-state" id="empty-state">
          Set availability and click <strong>Generate Schedule</strong>.
        </div>
        <div id="schedule-output" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Add Worker Modal ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add Worker</h3>
    <label class="field-label">Name</label>
    <input type="text" id="new-worker-name" placeholder="Full name" />
    <label class="field-label">Priority</label>
    <div class="priority-picker" id="priority-picker">
      <button class="priority-opt active" data-val="0" onclick="selectPriority(0)">Normal</button>
      <button class="priority-opt" data-val="1" onclick="selectPriority(1)">Priority</button>
      <button class="priority-opt" data-val="2" onclick="selectPriority(2)">High Priority</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="addWorker()">Add Worker</button>
    </div>
  </div>
</div>

<script>
  const DAYS = ["monday", "tuesday", "wednesday", "thursday", "saturday"];
  const DAY_FULL = { monday: "Monday", tuesday: "Tuesday", wednesday: "Wednesday", thursday: "Thursday", saturday: "Saturday" };
  const PRIORITY_LABELS = ["Normal", "Priority", "High Priority"];
  const PRIORITY_CLASSES = ["", "p1", "p2"];
  const WORKER_COLORS = [
    "#4f86c6","#e05c5c","#3aaa72","#e08c2a","#8a6bbf",
    "#2aaab4","#c47a2a","#5a8a5a","#c45a8a","#2a7ac4","#7aaa3a"
  ];

  let workers = JSON.parse(localStorage.getItem("scheduler-workers") || "[]");
  let availability = {};
  let newWorkerPriority = 0;
  let clipboardText = "";

  // ── Persistence ────────────────────────────────────────
  function saveWorkers() {
    localStorage.setItem("scheduler-workers", JSON.stringify(workers));
  }

  // ── Navigation ─────────────────────────────────────────
  function goToSchedule() {
    if (workers.length === 0) return alert("Add at least one worker first.");
    buildAvailability();
    document.getElementById("screen-workers").classList.remove("active");
    document.getElementById("screen-schedule").classList.add("active");
  }

  function goToWorkers() {
    document.getElementById("screen-schedule").classList.remove("active");
    document.getElementById("screen-workers").classList.add("active");
  }

  // ── Workers Screen ─────────────────────────────────────
  function getWorkerColor(name) {
    const allNames = workers.map(w => w.name).sort();
    return WORKER_COLORS[allNames.indexOf(name) % WORKER_COLORS.length];
  }

  function renderWorkers() {
    const grid = document.getElementById("worker-grid");
    grid.innerHTML = "";
    if (workers.length === 0) {
      grid.innerHTML = `<p class="empty-workers">No workers yet. Add one below.</p>`;
      return;
    }
    workers.forEach((w, wi) => {
      const card = document.createElement("div");
      card.className = "wcard";
      card.innerHTML = `
        <div class="wcard-color" style="background:${getWorkerColor(w.name)}"></div>
        <div class="wcard-body">
          <div class="wcard-header">
            <span class="wcard-name">${w.name}</span>
            <span class="wcard-priority ${PRIORITY_CLASSES[w.priority]}">${PRIORITY_LABELS[w.priority]}</span>
          </div>
          <button class="btn-remove" onclick="removeWorker(${wi})">Remove</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function removeWorker(wi) {
    if (!confirm(`Remove ${workers[wi].name}?`)) return;
    workers.splice(wi, 1);
    saveWorkers();
    renderWorkers();
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal() {
    document.getElementById("new-worker-name").value = "";
    selectPriority(0);
    document.getElementById("modal").classList.add("open");
    setTimeout(() => document.getElementById("new-worker-name").focus(), 50);
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("open");
  }

  function selectPriority(val) {
    newWorkerPriority = val;
    document.querySelectorAll(".priority-opt").forEach(btn => {
      btn.classList.toggle("active", parseInt(btn.dataset.val) === val);
    });
  }

  function addWorker() {
    const name = document.getElementById("new-worker-name").value.trim();
    if (!name) return alert("Enter a name.");
    if (workers.find(w => w.name.toLowerCase() === name.toLowerCase()))
      return alert("A worker with that name already exists.");
    workers.push({ name, priority: newWorkerPriority });
    saveWorkers();
    renderWorkers();
    closeModal();
  }

  document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  // ── Availability Screen ────────────────────────────────
  function buildAvailability() {
    availability = {};
    workers.forEach(w => {
      availability[w.name] = DAYS.map(d => ({
        day: d,
        selected: false,
        allDay: true,
        start: d === "saturday" ? 10 : 4,
        end: d === "saturday" ? 14 : 8,
      }));
    });
    renderAvailability();
  }

  function renderAvailability() {
    const list = document.getElementById("availability-list");
    list.innerHTML = "";
    workers.forEach(w => {
      const av = availability[w.name];
      const section = document.createElement("div");
      section.className = "av-section";
      section.innerHTML = `
        <div class="av-worker-header">
          <div class="av-color" style="background:${getWorkerColor(w.name)}"></div>
          <span class="av-name">${w.name}</span>
          <span class="av-priority ${PRIORITY_CLASSES[w.priority]}">${PRIORITY_LABELS[w.priority]}</span>
        </div>
        <div class="av-days">
          ${av.map((d, di) => `
            <div class="av-day-row ${d.selected ? "selected" : ""}">
              <label class="av-day-check">
                <input type="checkbox" ${d.selected ? "checked" : ""}
                  onchange="toggleDay('${w.name}', ${di}, this.checked)">
                <span class="av-day-label">${DAY_FULL[d.day]}</span>
              </label>
              ${d.selected ? `
                <div class="av-hours">
                  <label class="av-hours-check">
                    <input type="checkbox" ${d.allDay ? "checked" : ""}
                      onchange="toggleAllDay('${w.name}', ${di}, this.checked)">
                    <span>Default hours</span>
                  </label>
                  ${!d.allDay ? `
                    <div class="av-time-inputs">
                      <input type="number" value="${d.start}" min="3" max="14"
                        onchange="updateHour('${w.name}', ${di}, 'start', this.value)">
                      <span>–</span>
                      <input type="number" value="${d.end}" min="3" max="14"
                        onchange="updateHour('${w.name}', ${di}, 'end', this.value)">
                    </div>
                  ` : ""}
                </div>
              ` : ""}
            </div>
          `).join("")}
        </div>
      `;
      list.appendChild(section);
    });
  }

  function toggleDay(name, di, checked) {
    availability[name][di].selected = checked;
    renderAvailability();
  }

  function toggleAllDay(name, di, checked) {
    availability[name][di].allDay = checked;
    renderAvailability();
  }

  function updateHour(name, di, field, val) {
    availability[name][di][field] = parseInt(val);
  }

  // ── Generate ───────────────────────────────────────────
  async function generate() {
    const payload = workers.map(w => {
      const days = availability[w.name]
        .filter(d => d.selected)
        .map(d => ({ day: d.day, allDay: d.allDay, start: d.start, end: d.end }));
      return { name: w.name, priority: w.priority, days };
    }).filter(w => w.days.length > 0);

    if (payload.length === 0) return alert("No availability set.");

    const res = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ workers: payload }),
    });
    const data = await res.json();
    clipboardText = data.text;
    renderSchedule(data.schedule);
    document.getElementById("copy-btn").disabled = false;
  }

  // ── Timeline ───────────────────────────────────────────
  function timeToSlotIndex(time, isSaturday) {
    const parts = time.split(":");
    let hour = parseInt(parts[0]);
    const mins = parts[1] ? parseInt(parts[1]) : 0;
    if (isSaturday && hour < 10) hour += 12;
    const base = isSaturday ? 10 : 3;
    return (hour - base) * 2 + (mins === 30 ? 1 : 0);
  }

  function renderSchedule(schedule) {
    document.getElementById("empty-state").style.display = "none";
    const output = document.getElementById("schedule-output");
    output.style.display = "block";
    const weekdaySlots = ["3","3:30","4","4:30","5","5:30","6","6:30","7","7:30","8"];
    const saturdaySlots = ["10","10:30","11","11:30","12","12:30","1","1:30","2"];

    let html = `<div class="timeline">`;
    for (const day of schedule) {
      const isSat = day.day === "Saturday";
      const slots = isSat ? saturdaySlots : weekdaySlots;
      const slotLabels = slots.map(s => `<div class="timeline-slot-label">${s}</div>`).join("");
      const gridLines = slots.map(() => `<div class="timeline-grid-line"></div>`).join("");
      const workerCols = day.assignments.map(a => {
        const startIdx = timeToSlotIndex(a.start, isSat);
        const endIdx = timeToSlotIndex(a.end, isSat);
        const color = getWorkerColor(a.name);
        return `
          <div class="timeline-worker-col">
            <div class="timeline-grid-lines">${gridLines}</div>
            <div class="worker-block"
              style="top:${startIdx * 40}px; height:${(endIdx - startIdx) * 40}px; background:${color};"
              title="${a.name}: ${a.start}–${a.end}">${a.name}</div>
          </div>`;
      }).join("");
      html += `
        <div class="timeline-day">
          <div class="timeline-day-header">${day.day}</div>
          <div class="timeline-body">
            <div class="timeline-slots">${slotLabels}</div>
            <div class="timeline-workers">${workerCols}</div>
          </div>
        </div>`;
    }
    html += `</div>`;
    output.innerHTML = html;
  }

  // ── Clipboard ──────────────────────────────────────────
  function copyToClipboard() {
    navigator.clipboard.writeText(clipboardText).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy to Clipboard", 2000);
    });
  }

  renderWorkers();
</script>
</body>
</html>
